<div class="flex flex-col w-full md:w-[600px] overflow-hidden bg-white dark:bg-card rounded-2xl">
    
    <!-- Header -->
    <div class="flex items-center justify-between px-8 py-6">
        <h2 class="text-2xl font-bold text-gray-900 dark:text-white">{{ mode === 'create' ? 'Create Department' : 'Edit Department' }}</h2>
    </div>

    <!-- Form -->
    <form [formGroup]="departmentForm" class="flex flex-col flex-auto px-8 pb-8">
        
        <!-- Department Name -->
        <div class="flex flex-col mb-5">
            <label class="mb-2 font-medium text-gray-700 dark:text-gray-300">Department Name<span class="text-red-500">*</span></label>
            <input 
                type="text" 
                formControlName="name"
                class="w-full px-4 py-3 rounded-xl border border-gray-300 bg-white focus:bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all dark:bg-gray-800 dark:border-gray-700"
                placeholder="Enter department name">
            <div *ngIf="departmentForm.get('name')?.touched && departmentForm.get('name')?.invalid" class="mt-1 text-xs text-red-500">
                Department Name is required
            </div>
        </div>

        <!-- Description -->
        <div class="flex flex-col mb-5">
            <label class="mb-2 font-medium text-gray-700 dark:text-gray-300">Description</label>
            <textarea 
                formControlName="description"
                rows="3"
                class="w-full px-4 py-3 rounded-xl border border-gray-300 bg-white focus:bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all dark:bg-gray-800 dark:border-gray-700"
                placeholder="Enter description"></textarea>
        </div>

        <!-- Head of Department -->
        <div class="flex flex-col mb-5">
            <label class="mb-2 font-medium text-gray-700 dark:text-gray-300">Head of Department</label>
            <mat-form-field appearance="outline" class="w-full" subscriptSizing="dynamic">
                <mat-select formControlName="head" [compareWith]="compareUsers">
                    <mat-select-trigger>
                        <span *ngIf="departmentForm.get('head')?.value" class="flex items-center gap-2">
                            <img [src]="departmentForm.get('head')?.value?.avatar || 'assets/images/avatars/male-01.jpg'" class="w-6 h-6 rounded-full object-cover">
                            <span>{{ departmentForm.get('head')?.value?.fullName }}</span>
                        </span>
                    </mat-select-trigger>
                    <mat-option [value]="null">None</mat-option>
                    <mat-option *ngFor="let user of users" [value]="user">
                        <div class="flex items-center gap-3 py-1">
                            <img [src]="user.avatar || 'assets/images/avatars/male-01.jpg'" class="w-8 h-8 rounded-full object-cover">
                            <div class="flex flex-col">
                                <span class="font-medium leading-none">{{ user.fullName }}</span>
                                <span class="text-xs text-gray-500 mt-1">{{ user.email }}</span>
                            </div>
                        </div>
                    </mat-option>
                </mat-select>
            </mat-form-field>
        </div>

        <!-- Status -->
        <div class="flex flex-col mb-5">
            <label class="mb-2 font-medium text-gray-700 dark:text-gray-300">Status<span class="text-red-500">*</span></label>
            <mat-form-field appearance="outline" class="w-full" subscriptSizing="dynamic">
                <mat-select formControlName="status">
                    <mat-option value="Active">
                        <div class="flex items-center gap-2">
                            <div class="h-2 w-2 rounded-full bg-green-500"></div>
                            <span>Active</span>
                        </div>
                    </mat-option>
                    <mat-option value="Inactive">
                        <div class="flex items-center gap-2">
                            <div class="h-2 w-2 rounded-full bg-red-500"></div>
                            <span>Inactive</span>
                        </div>
                    </mat-option>
                </mat-select>
            </mat-form-field>
        </div>

    </form>

    <!-- Footer Actions -->
    <div class="flex items-center justify-end gap-3 px-8 pb-8">
        <button 
            mat-stroked-button 
            (click)="matDialogRef.close()"
            class="px-6 h-10 rounded-full border-blue-900 text-blue-900 hover:bg-blue-50 dark:border-blue-400 dark:text-blue-400">
            Cancel
        </button>
        <button 
            mat-flat-button 
            [disabled]="departmentForm.invalid"
            (click)="save()"
            class="px-6 h-10 rounded-full bg-gray-200 text-gray-600 hover:bg-gray-300 disabled:opacity-50 disabled:cursor-not-allowed dark:bg-gray-700 dark:text-gray-200">
            {{ mode === 'create' ? 'Create' : 'Update' }}
        </button>
    </div>

</div>
