- hosts: helpdesk-be
  vars:
    image: ioez1984/helpdeskbe:latest
    remote_app_path: /opt/helpdesk-backend
    host_storage_path: /etc/storage # The host path you requested

  tasks:
    - name: Ensure application directory exists
      file:
        path: "{{ remote_app_path }}"
        state: directory
        mode: '0755'

    - name: Ensure host storage directory exists
      file:
        path: "{{ item }}"
        state: directory
        mode: '0775'
        owner: 33 # UID for www-data
        group: 33 # GID for www-data
      with_items:
        - "{{ host_storage_path }}"
        - "{{ host_storage_path }}/app"
        - "{{ host_storage_path }}/app/public"
        - "{{ host_storage_path }}/framework"
        - "{{ host_storage_path }}/framework/cache"
        - "{{ host_storage_path }}/framework/sessions"
        - "{{ host_storage_path }}/framework/views"
        - "{{ host_storage_path }}/logs"

    - name: Deploy .env file with correct permissions
      copy:
        src: "{{ playbook_dir }}/.env"
        dest: "{{ remote_app_path }}/.env"
        mode: '0644'

    - name: pull latest backend image
      docker_image:
        name: "{{ image }}"
        source: pull
        force_source: yes
        state: present

    - name: run laravel container
      docker_container:
        name: helpdesk-byjenkins
        image: "{{ image }}"
        state: started
        restart_policy: always
        published_ports:
          - "80:80"
        volumes:
          - "{{ remote_app_path }}/.env:/var/www/html/.env"
          # NEW VOLUME MOUNT: Persistent storage
          - "{{ host_storage_path }}:/var/www/html/storage"
        recreate: yes

    - name: Force internal ownership and clear cache
      command: "docker exec -u root helpdesk-byjenkins {{ item }}"
      with_items:
        - "chown www-data:www-data /var/www/html/.env"
        - "chown -R www-data:www-data /var/www/html/storage"
        - "php artisan optimize:clear"

    - name: Remove dangling docker images
      docker_prune:
        images: yes
        images_filters:
          dangling: true
