- hosts: helpdesk-be
  vars:
    image: ioez1984/helpdeskbe:latest
    remote_app_path: /opt/helpdesk-backend

  tasks:
    - name: Ensure application directory exists
      file:
        path: "{{ remote_app_path }}"
        state: directory
        mode: '0755'

    - name: Deploy .env file from Jenkins to Server
      copy:
        src: "{{ playbook_dir }}/.env"
        dest: "{{ remote_app_path }}/.env"
        mode: '0600'

    - name: pull latest backend image
      docker_image:
        name: "{{ image }}"
        source: pull
        force_source: yes
        state: present

    - name: run laravel container
      docker_container:
        name: helpdesk-byjenkins
        image: "{{ image }}"
        state: started
        restart_policy: always
        published_ports:
          - "80:80"
        volumes:
          # Only mount the .env file, no storage volumes
          - "{{ remote_app_path }}/.env:/var/www/html/.env"
        recreate: yes

    - name: Run Laravel optimization and storage link
      command: "docker exec helpdesk-byjenkins {{ item }}"
      with_items:
        - "php artisan storage:link"
        - "php artisan optimize:clear"
      ignore_errors: yes

    - name: cleanup dangling images
      shell: |
        oldimage=$(docker images -f "dangling=true" -q)
        if [ -n "$oldimage" ]; then
          docker rmi $oldimage -f
        fi
      ignore_errors: yes
      become: true
