<div class="flex min-h-full w-full flex-col bg-[#F1F5F9] dark:bg-transparent">
    <!-- BREADCRUMB HEADER -->
    <div
        class="flex items-center justify-between border-b bg-white px-8 py-4 text-sm dark:bg-card"
    >
        <span class="font-semibold text-gray-800 dark:text-white">Job Requests</span>
        <div class="text-secondary flex items-center gap-1">
            <span class="font-semibold text-primary">Dashboard</span>
        </div>
    </div>

    <!-- HEADER + FILTER CARD -->
    <div
        class="mx-8 mb-6 mt-8 rounded-2xl border border-gray-100 bg-white px-6 py-5 shadow-sm dark:bg-card"
    >
        <!-- TOP ROW -->
        <div class="flex items-start justify-between">
            <div>
                <h2 class="text-lg font-bold text-gray-900 dark:text-white">
                    Job Request Dashboard
                </h2>
                <p class="text-secondary mt-0.5 text-sm">
                    Filter your job request data
                </p>
            </div>
            <div class="flex items-center gap-2">
                <button
                    (click)="toggleFilter()"
                    class="flex items-center gap-1.5 rounded-full border border-gray-300 px-4 py-2 text-sm font-medium text-gray-600 transition hover:bg-gray-50"
                >
                    <svg
                        class="h-4 w-4"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"
                        />
                    </svg>
                    Filter
                </button>
                <button
                    (click)="resetFilter()"
                    class="flex items-center gap-1.5 rounded-full border border-gray-300 px-4 py-2 text-sm font-medium text-gray-600 transition hover:bg-gray-50"
                >
                    <svg
                        class="h-4 w-4"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"
                        />
                    </svg>
                    Reset
                </button>
                <button
                    class="flex items-center gap-1.5 rounded-full bg-indigo-600 px-4 py-2 text-sm font-medium text-white transition hover:bg-indigo-700 shadow-md shadow-indigo-200"
                    [routerLink]="['/job-requests/create']"
                >
                    <svg
                        class="h-4 w-4"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M12 4v16m8-8H4"
                        />
                    </svg>
                    New Request
                </button>
            </div>
        </div>

        <!-- COLLAPSIBLE FILTER SECTION -->
        <div [@collapseFilter]="filterOpen ? 'open' : 'closed'">
            <div class="flex flex-wrap gap-4 pt-4 border-t border-gray-100 mt-4">

                <!-- Period -->
                <div class="flex flex-col w-72">
                    <label class="text-secondary mb-1 ml-1 text-xs">Period</label>
                    <mat-form-field appearance="outline" class="fuse-mat-small w-full" subscriptSizing="dynamic">
                        <mat-select [(ngModel)]="selectedPeriod">
                            <mat-option *ngFor="let p of periods" [value]="p.value">
                                {{ p.label }}
                            </mat-option>
                        </mat-select>
                    </mat-form-field>
                </div>

                <!-- Start Date -->
                <div class="flex flex-col w-44">
                    <label class="mb-1 ml-1 text-xs font-medium text-gray-500">From</label>
                    <input type="date" [(ngModel)]="startDate" class="h-[38px] w-full rounded-lg border border-gray-200 bg-gray-50 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" />
                </div>

                <!-- End Date -->
                <div class="flex flex-col w-44">
                    <label class="mb-1 ml-1 text-xs font-medium text-gray-500">To</label>
                    <input type="date" [(ngModel)]="endDate" class="h-[38px] w-full rounded-lg border border-gray-200 bg-gray-50 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" />
                </div>

            </div>

            <div class="flex justify-end mt-4 pt-4 border-t border-gray-100">
                <button (click)="resetFilter()" class="text-sm text-gray-500 hover:text-gray-700 font-medium px-4 py-2">
                    Reset
                </button>
                <button class="ml-2 bg-indigo-600 text-white text-sm font-medium px-4 py-2 rounded-lg hover:bg-indigo-700">
                    Apply Filter
                </button>
            </div>
        </div>
    </div>

    <!-- STATS GRID -->
    <div class="mx-8 mb-8 grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-4">
        <div
            *ngFor="let stat of stats"
            class="group relative overflow-hidden rounded-2xl bg-white p-6 shadow-sm transition hover:shadow-md dark:bg-card"
        >
            <div class="flex items-start justify-between">
                <div class="flex items-center gap-2">
                    <div
                        class="flex h-8 w-8 items-center justify-center rounded-lg"
                        [ngClass]="stat.bg"
                    >
                        <svg
                            class="h-5 w-5"
                            [ngClass]="stat.icon"
                            fill="none"
                            stroke="currentColor"
                            viewBox="0 0 24 24"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                stroke-width="2"
                                d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"
                            />
                        </svg>
                    </div>
                    <span
                        class="rounded-full px-2 py-0.5 text-xs font-semibold"
                        [ngClass]="
                            stat.up
                                ? 'bg-emerald-50 text-emerald-600'
                                : 'bg-red-50 text-red-600'
                        "
                    >
                        {{ stat.trend }}
                    </span>
                </div>
                <div
                    class="text-2xl font-extrabold text-gray-900 dark:text-white"
                >
                    {{ stat.value }}
                </div>
            </div>
            <div class="text-secondary mt-1 text-xs font-medium">
                {{ stat.title }}
            </div>
        </div>
    </div>

    <!-- CHARTS ROW -->
    <div class="mx-8 mb-8 grid grid-cols-1 gap-6 lg:grid-cols-3">
        <!-- LINE CHART (Left, larger) -->
        <div
            class="rounded-2xl border border-gray-100 bg-white p-6 shadow-sm dark:bg-card lg:col-span-2"
        >
            <div class="mb-6 flex items-center justify-between">
                <div>
                    <h3 class="font-bold text-gray-900 dark:text-white">
                        Job Request Trends
                    </h3>
                    <p class="text-secondary text-sm">
                        Request volume over time
                    </p>
                </div>
                <button
                    class="rounded-lg p-1.5 text-gray-400 hover:bg-gray-50 hover:text-gray-600"
                >
                    <svg
                        class="h-5 w-5"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"
                        />
                    </svg>
                </button>
            </div>
            <apx-chart
                [series]="chartOptions.series"
                [chart]="chartOptions.chart"
                [xaxis]="chartOptions.xaxis"
                [stroke]="chartOptions.stroke"
                [tooltip]="chartOptions.tooltip"
                [dataLabels]="chartOptions.dataLabels"
            ></apx-chart>
        </div>

        <!-- DONUT CHART (Right, smaller) -->
        <div
            class="rounded-2xl border border-gray-100 bg-white p-6 shadow-sm dark:bg-card"
        >
            <div class="mb-6 flex items-center justify-between">
                <div>
                    <h3 class="font-bold text-gray-900 dark:text-white">
                        Requests By Status
                    </h3>
                    <p class="text-secondary text-sm">Distribution</p>
                </div>
            </div>
            <apx-chart
                [series]="pieOptions.series"
                [chart]="pieOptions.chart"
                [labels]="pieOptions.labels"
                [colors]="pieOptions.colors"
                [legend]="pieOptions.legend"
            ></apx-chart>
        </div>
    </div>
</div>
