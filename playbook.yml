- hosts: all-docker-2
  vars:
    image: ioez1984/helpdeskfe

  tasks:
    - name: install python-docker centos
      yum:
        name:
          - python
          - python-docker
        state: present

    - name: pull image docker
      docker_image:
        name: "{{ image }}"
        source: pull
        force_source: yes
        state: present

    - name: create containers
      docker_container:
        name: helpdeskfe-byjenkins
        image: "{{ image }}"
        state: started
        restart_policy: always
        published_ports:
        - 8086:80
        recreate: yes
        # --- RESOURCE LIMITS ADDED HERE ---
        memory: "2g"                  # Hard limit: Container will be killed if it exceeds 4GB
        memory_reservation: "1g"      # Soft limit: Container is guaranteed at least 1GB
        cpus: 2.0                     # CPU limit: Max 2 physical cores can be used by this container
        # ---------------------------------

    - name: Remove dangling docker images
      docker_prune:
        images: yes
        images_filters:
          dangling: true
      ignore_errors: yes
      become: true

      ignore_errors: yes
      become: true
