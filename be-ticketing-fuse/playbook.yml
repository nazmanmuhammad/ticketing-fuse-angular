- hosts: all-docker-2
  vars:
    image: ioez1984/helpdeskbe:latest
    remote_app_path: /mnt/helpdesk-backend/env
    host_storage_path: /mnt/helpdesk-backend/storage # The host path you requested

  tasks:
    - name: Ensure application directory exists
      file:
        path: "{{ remote_app_path }}"
        state: directory
        mode: '0755'

    - name: Ensure base host storage path exists
      file:
        path: "{{ host_storage_path }}"
        state: directory
        mode: '0775'
        owner: 33 
        group: 33

    - name: Deploy .env file with correct permissions
      copy:
        src: "{{ playbook_dir }}/.env"
        dest: "{{ remote_app_path }}/.env"
        mode: '0644'

    - name: pull latest backend image
      docker_image:
        name: "{{ image }}"
        source: pull
        force_source: yes
        state: present

    - name: run laravel container
      docker_container:
        name: helpdesk-byjenkins
        image: "{{ image }}"
        state: started
        restart_policy: always
        published_ports:
          - "80:80"
        volumes:
          - "{{ remote_app_path }}/.env:/var/www/html/.env"
          # NEW VOLUME MOUNT: Persistent storage
          - "{{ host_storage_path }}:/var/www/html/storage"
        recreate: yes
        # --- RESOURCE LIMITS ADDED HERE ---
        memory: "2g"                  # Hard limit: Container will be killed if it exceeds 4GB
        memory_reservation: "1g"      # Soft limit: Container is guaranteed at least 1GB
        cpus: 2.0                     # CPU limit: Max 2 physical cores can be used by this container
        # ---------------------------------
        
    - name: Force internal ownership and clear cache
      command: "docker exec -u root helpdesk-byjenkins {{ item }}"
      with_items:
        - "chown www-data:www-data /var/www/html/.env"
        - "chown -R www-data:www-data /var/www/html/storage"
        - "php artisan optimize:clear"

    - name: Remove dangling docker images
      docker_prune:
        images: yes
        images_filters:
          dangling: true
