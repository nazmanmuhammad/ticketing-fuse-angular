<div class="flex min-h-full w-full flex-col bg-[#F1F5F9] dark:bg-transparent">
    <div class="flex items-center justify-between border-b bg-white px-8 py-4 text-sm dark:bg-card">
        <span class="font-semibold text-gray-800 dark:text-white">Application Setting</span>
        <div class="text-secondary flex items-center gap-1">
            <span>Dashboard</span>
            <span>•</span>
            <span class="font-semibold text-primary">Settings</span>
            <span>•</span>
            <span class="font-semibold text-primary">Application</span>
        </div>
    </div>

    <div class="mx-8 my-8 rounded-2xl border border-gray-100 bg-white p-6 shadow-sm dark:bg-card">
        <h2 class="text-lg font-bold text-gray-900 dark:text-white">Application Configuration</h2>
        <p class="text-secondary mt-1 text-sm">Atur logo, title, nama aplikasi, dan favicon.</p>
        <p *ngIf="isLoading" class="mt-2 text-xs text-indigo-600">Memuat data setting...</p>

        <div class="mt-6 grid grid-cols-1 gap-4 md:grid-cols-2">
            <div>
                <label class="mb-1 block text-sm font-medium text-gray-700">Application Name</label>
                <input [(ngModel)]="form.appName" type="text" class="h-12 w-full rounded-xl border border-gray-200 bg-gray-50 px-3 py-0 text-sm leading-[48px] focus:outline-none focus:ring-2 focus:ring-indigo-200 dark:bg-gray-800" />
            </div>
            <div>
                <label class="mb-1 block text-sm font-medium text-gray-700">Application Title</label>
                <input [(ngModel)]="form.appTitle" type="text" class="h-12 w-full rounded-xl border border-gray-200 bg-gray-50 px-3 py-0 text-sm leading-[48px] focus:outline-none focus:ring-2 focus:ring-indigo-200 dark:bg-gray-800" />
            </div>
            <div>
                <label class="mb-1 block text-sm font-medium text-gray-700">Logo URL (optional)</label>
                <input [(ngModel)]="form.logoUrl" type="text" class="h-12 w-full rounded-xl border border-gray-200 bg-gray-50 px-3 py-0 text-sm leading-[48px] focus:outline-none focus:ring-2 focus:ring-indigo-200 dark:bg-gray-800" placeholder="https://example.com/logo.png" />
            </div>
            <div>
                <label class="mb-1 block text-sm font-medium text-gray-700">Favicon URL (optional)</label>
                <input [(ngModel)]="form.faviconUrl" type="text" class="h-12 w-full rounded-xl border border-gray-200 bg-gray-50 px-3 py-0 text-sm leading-[48px] focus:outline-none focus:ring-2 focus:ring-indigo-200 dark:bg-gray-800" placeholder="https://example.com/favicon.ico" />
            </div>
            <div class="md:col-span-2 grid grid-cols-1 gap-4 lg:grid-cols-2">
                <div class="rounded-xl border border-indigo-100 bg-indigo-50/40 p-4">
                    <label class="mb-3 block text-sm font-semibold text-indigo-900">Logo Upload</label>

                    <label class="block cursor-pointer rounded-xl border-2 border-dashed border-indigo-200 bg-white px-4 py-6 text-center transition hover:border-indigo-400 hover:bg-indigo-50/50">
                        <input type="file" accept="image/*" (change)="onLogoSelected($event)" class="hidden" />
                        <div class="mx-auto mb-2 flex h-10 w-10 items-center justify-center rounded-full bg-indigo-100 text-indigo-600">
                            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 16V8m0 0l-3 3m3-3l3 3m6 5a2 2 0 01-2 2H5a2 2 0 01-2-2m16-4.586A1 1 0 0018.707 11L13.414 5.707a2 2 0 00-2.828 0L5.293 11A1 1 0 005 11.414V12" />
                            </svg>
                        </div>
                        <p class="text-sm font-semibold text-gray-800">Click to upload logo</p>
                        <p class="mt-1 text-xs text-gray-500">PNG/JPG/SVG, rekomendasi background transparan</p>
                    </label>

                    <div class="mt-4 rounded-lg border border-indigo-100 bg-white p-3">
                        <p class="mb-2 text-xs font-semibold uppercase tracking-wide text-indigo-700">Logo Preview</p>
                        <div class="flex h-20 items-center justify-center rounded-lg border border-gray-200 bg-gray-50">
                            <img
                                *ngIf="logoPreview || form.logoUrl"
                                [src]="logoPreview || form.logoUrl"
                                alt="Logo Preview"
                                class="max-h-14 max-w-[180px] object-contain"
                            />
                            <span *ngIf="!logoPreview && !form.logoUrl" class="text-xs text-gray-400">Belum ada logo dipilih</span>
                        </div>
                    </div>
                </div>

                <div class="rounded-xl border border-emerald-100 bg-emerald-50/40 p-4">
                    <label class="mb-3 block text-sm font-semibold text-emerald-900">Favicon Upload</label>

                    <label class="block cursor-pointer rounded-xl border-2 border-dashed border-emerald-200 bg-white px-4 py-6 text-center transition hover:border-emerald-400 hover:bg-emerald-50/50">
                        <input type="file" accept="image/*" (change)="onFaviconSelected($event)" class="hidden" />
                        <div class="mx-auto mb-2 flex h-10 w-10 items-center justify-center rounded-full bg-emerald-100 text-emerald-600">
                            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 16V8m0 0l-3 3m3-3l3 3m6 5a2 2 0 01-2 2H5a2 2 0 01-2-2m16-4.586A1 1 0 0018.707 11L13.414 5.707a2 2 0 00-2.828 0L5.293 11A1 1 0 005 11.414V12" />
                            </svg>
                        </div>
                        <p class="text-sm font-semibold text-gray-800">Click to upload favicon</p>
                        <p class="mt-1 text-xs text-gray-500">ICO/PNG, rasio ideal 1:1 (32x32 atau 64x64)</p>
                    </label>

                    <div class="mt-4 rounded-lg border border-emerald-100 bg-white p-3">
                        <p class="mb-2 text-xs font-semibold uppercase tracking-wide text-emerald-700">Favicon Preview</p>
                        <div class="flex h-20 items-center justify-center gap-3 rounded-lg border border-gray-200 bg-gray-50">
                            <div class="flex h-12 w-12 items-center justify-center rounded-lg border border-gray-200 bg-white">
                                <img
                                    *ngIf="faviconPreview || form.faviconUrl"
                                    [src]="faviconPreview || form.faviconUrl"
                                    alt="Favicon Preview"
                                    class="h-8 w-8 object-contain"
                                />
                                <span *ngIf="!faviconPreview && !form.faviconUrl" class="text-[10px] text-gray-400">--</span>
                            </div>
                            <span class="text-xs text-gray-500">Preview tab browser</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-6 flex justify-end">
            <button
                (click)="save()"
                [disabled]="isSaving"
                class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-700 disabled:cursor-not-allowed disabled:opacity-70"
            >
                {{ isSaving ? 'Saving...' : 'Save Application Setting' }}
            </button>
        </div>
    </div>
</div>
