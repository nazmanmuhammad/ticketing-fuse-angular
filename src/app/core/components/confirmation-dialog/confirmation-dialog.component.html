<div class="relative">
    <!-- Header -->
    <div class="mb-4 flex items-start gap-4">
        <!-- Icon -->
        <div
            class="flex h-12 w-12 flex-shrink-0 items-center justify-center rounded-full"
            [ngClass]="{
                'bg-red-100': data.type === 'danger',
                'bg-orange-100': data.type === 'warning',
                'bg-blue-100': data.type === 'info'
            }"
        >
            <svg
                class="h-6 w-6"
                [ngClass]="getIconClass()"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
            >
                <path
                    *ngIf="data.type === 'danger'"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                />
                <path
                    *ngIf="data.type === 'warning'"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
                />
                <path
                    *ngIf="data.type === 'info'"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
                />
            </svg>
        </div>

        <!-- Title & Message -->
        <div class="flex-1">
            <h2 class="text-lg font-semibold text-gray-900 dark:text-white">
                {{ data.title }}
            </h2>
            <p class="mt-2 text-sm text-gray-600 dark:text-gray-400">
                {{ data.message }}
            </p>
        </div>
    </div>

    <!-- Actions -->
    <div class="flex justify-end gap-3">
        <button
            type="button"
            (click)="onCancel()"
            class="rounded-lg border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 transition-colors hover:bg-gray-50 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-300 dark:hover:bg-gray-700"
        >
            {{ data.cancelText }}
        </button>
        <button
            type="button"
            (click)="onConfirm()"
            class="rounded-lg px-4 py-2 text-sm font-semibold text-white transition-colors"
            [ngClass]="getConfirmButtonClass()"
        >
            {{ data.confirmText }}
        </button>
    </div>
</div>
