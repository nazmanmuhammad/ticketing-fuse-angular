<!-- Loading bar -->
<fuse-loading-bar></fuse-loading-bar>

<!-- Main Layout Container -->
<div class="flex h-full w-full">
    <!-- Mini Sidebar (Icon Navigation) - 80px -->
    <fuse-vertical-navigation
        class="bg-primary dark:bg-gray-900 print:hidden"
        [appearance]="'thin'"
        [mode]="isScreenSmall ? 'over' : 'side'"
        [name]="'mainNavigation'"
        [navigation]="navigation.compact"
        [opened]="!isScreenSmall"
    >
        <!-- Navigation header hook -->
        <ng-container fuseVerticalNavigationContentHeader>
            <!-- Hanya Icon Hamburger (Toggle Normal Sidebar) -->
            <div class="flex h-20 items-center justify-center">
                <button
                    mat-icon-button
                    (click)="toggleNormalSidebar()"
                    matTooltip="Toggle Menu"
                    matTooltipPosition="right"
                >
                    <mat-icon [svgIcon]="'heroicons_outline:bars-3'"></mat-icon>
                </button>
            </div>
        </ng-container>
    </fuse-vertical-navigation>

    <!-- Main Content Wrapper (Header + Content + Footer) -->
    <div class="flex w-full min-w-0 flex-auto flex-col">
        <!-- Header -->
        <div
            class="bg-card relative z-49 flex h-16 w-full flex-0 items-center px-4 shadow md:px-6 dark:border-b dark:bg-transparent dark:shadow-none print:hidden"
        >
            <!-- Hamburger button hanya untuk mobile -->
            @if (isScreenSmall) {
                <button
                    class="mr-2"
                    mat-icon-button
                    (click)="toggleNavigation('mainNavigation')"
                >
                    <mat-icon [svgIcon]="'heroicons_outline:bars-3'"></mat-icon>
                </button>
            }

            <!-- Components -->
            <div
                class="ml-auto flex items-center space-x-0.5 pl-2 sm:space-x-2"
            >
                <languages></languages>
                <fuse-fullscreen class="hidden md:block"></fuse-fullscreen>
                <search [appearance]="'bar'"></search>
                <shortcuts></shortcuts>
                <messages></messages>
                <notifications></notifications>
                <button
                    mat-icon-button
                    (click)="toggleColorScheme()"
                    [matTooltip]="
                        isDarkMode()
                            ? 'Switch to light mode'
                            : 'Switch to dark mode'
                    "
                >
                    <mat-icon
                        [svgIcon]="
                            isDarkMode()
                                ? 'heroicons_outline:sun'
                                : 'heroicons_outline:moon'
                        "
                    ></mat-icon>
                </button>
                <!-- <button
                    class="lg:hidden"
                    mat-icon-button
                    (click)="quickChat.toggle()"
                >
                    <mat-icon
                        [svgIcon]="'heroicons_outline:chat-bubble-left-right'"
                    ></mat-icon>
                </button> -->
                <user></user>
            </div>
        </div>

        <!-- Content -->
        <div class="flex flex-auto flex-col">
            @if (true) {
                <router-outlet></router-outlet>
            }
        </div>

        <!-- Footer -->
        <div
            class="bg-card relative z-49 flex h-14 w-full flex-0 items-center justify-start border-t px-4 md:px-6 dark:bg-transparent print:hidden"
        >
            <span class="text-secondary font-medium"
                >Fuse &copy; {{ currentYear }}</span
            >
        </div>
    </div>
</div>
