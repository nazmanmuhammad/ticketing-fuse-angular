<!doctype html>
<html lang="en">
    <head>
        <title>SIG Helpdesk</title>
        <meta charset="utf-8" />
        <meta
            name="description"
            content="SIG Helpdesk is a helpdesk system that helps users to report issues and get help from the administrators."
        />
        <meta
            name="keywords"
            content="SIG Helpdesk,Helpdesk,Angular,Angular 13,Angular 14,Angular 15,Material,Angular Components,Tailwind,Tailwind CSS,TailwindCSS,Admin Template,Admin Starter Kit"
        />
        <meta
            name="viewport"
            content="width=device-width, height=device-height, initial-scale=1.0, minimum-scale=1.0"
        />

        <base href="/" />

        <!-- Favicon -->
        <link rel="icon" type="image/png" href="images/logo/favicon.png" />
        <link rel="icon" type="image/png" href="images/logo/favicon.png" />

        <!-- Fonts -->
        <link href="https://fonts.gstatic.com" rel="preconnect" />
        <link
            href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap"
            rel="stylesheet"
        />

        <!-- Icon fonts -->
        <link
            href="https://fonts.googleapis.com/icon?family=Material+Icons"
            rel="stylesheet"
        />
    </head>

    <body>
        <!-- Splash screen -->
        <fuse-splash-screen>
            <img class="min-w-56 h-16" src="images/logo/helpdesk-logo-white-center.png" alt="Fuse logo" />
            <div class="spinner">
                <div class="bounce1 bg-[#309930]"></div>
                <div class="bounce2 bg-[#309930]"></div>
                <div class="bounce3 bg-[#309930]"></div>
            </div>
        </fuse-splash-screen>

        <!-- App root -->
        <app-root></app-root>
    </body>
</html>
