<div class="flex min-h-full w-full flex-col bg-[#F1F5F9] dark:bg-transparent">
    <div class="flex items-center justify-between border-b bg-white px-8 py-4 text-sm dark:bg-card">
        <span class="font-semibold text-gray-800 dark:text-white">SMTP Setting</span>
        <div class="text-secondary flex items-center gap-1">
            <span>Dashboard</span>
            <span>•</span>
            <span class="font-semibold text-primary">Settings</span>
            <span>•</span>
            <span class="font-semibold text-primary">SMTP</span>
        </div>
    </div>

    <div class="mx-8 my-8 rounded-2xl border border-gray-100 bg-white p-6 shadow-sm dark:bg-card">
        <h2 class="text-lg font-bold text-gray-900 dark:text-white">SMTP Configuration</h2>
        <p class="text-secondary mt-1 text-sm">Atur koneksi email untuk notifikasi sistem.</p>
        <p *ngIf="isLoading" class="mt-2 text-xs text-indigo-600">Memuat data SMTP...</p>

        <div class="mt-6 grid grid-cols-1 gap-4 md:grid-cols-2">
            <div>
                <label class="mb-1 block text-sm font-medium text-gray-700">SMTP Host</label>
                <input [(ngModel)]="form.host" type="text" class="h-12 w-full rounded-xl border border-gray-200 bg-gray-50 px-3 py-0 text-sm leading-[48px] focus:outline-none focus:ring-2 focus:ring-indigo-200 dark:bg-gray-800" placeholder="smtp.gmail.com" />
            </div>
            <div>
                <label class="mb-1 block text-sm font-medium text-gray-700">SMTP Port</label>
                <input [(ngModel)]="form.port" type="number" class="h-12 w-full rounded-xl border border-gray-200 bg-gray-50 px-3 py-0 text-sm leading-[48px] focus:outline-none focus:ring-2 focus:ring-indigo-200 dark:bg-gray-800" />
            </div>
            <div>
                <label class="mb-1 block text-sm font-medium text-gray-700">Encryption</label>
                <select [(ngModel)]="form.encryption" class="appearance-none h-12 w-full rounded-xl border border-gray-200 bg-gray-50 px-3 py-0 pr-8 text-sm leading-[48px] focus:outline-none focus:ring-2 focus:ring-indigo-200 dark:bg-gray-800">
                    <option value="none">None</option>
                    <option value="ssl">SSL</option>
                    <option value="tls">TLS</option>
                </select>
            </div>
            <div>
                <label class="mb-1 block text-sm font-medium text-gray-700">SMTP Username</label>
                <input [(ngModel)]="form.username" type="text" class="h-12 w-full rounded-xl border border-gray-200 bg-gray-50 px-3 py-0 text-sm leading-[48px] focus:outline-none focus:ring-2 focus:ring-indigo-200 dark:bg-gray-800" />
            </div>
            <div>
                <label class="mb-1 block text-sm font-medium text-gray-700">SMTP Password</label>
                <input [(ngModel)]="form.password" type="password" class="h-12 w-full rounded-xl border border-gray-200 bg-gray-50 px-3 py-0 text-sm leading-[48px] focus:outline-none focus:ring-2 focus:ring-indigo-200 dark:bg-gray-800" />
            </div>
            <div>
                <label class="mb-1 block text-sm font-medium text-gray-700">From Name</label>
                <input [(ngModel)]="form.fromName" type="text" class="h-12 w-full rounded-xl border border-gray-200 bg-gray-50 px-3 py-0 text-sm leading-[48px] focus:outline-none focus:ring-2 focus:ring-indigo-200 dark:bg-gray-800" />
            </div>
            <div class="md:col-span-2">
                <label class="mb-1 block text-sm font-medium text-gray-700">From Email</label>
                <input [(ngModel)]="form.fromEmail" type="email" class="h-12 w-full rounded-xl border border-gray-200 bg-gray-50 px-3 py-0 text-sm leading-[48px] focus:outline-none focus:ring-2 focus:ring-indigo-200 dark:bg-gray-800" placeholder="no-reply@domain.com" />
            </div>
        </div>

        <div class="mt-6 flex justify-end">
            <button
                (click)="save()"
                [disabled]="isSaving"
                class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-700 disabled:cursor-not-allowed disabled:opacity-70"
            >
                {{ isSaving ? 'Saving...' : 'Save SMTP Setting' }}
            </button>
        </div>
    </div>
</div>
